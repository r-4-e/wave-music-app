workflows:
  wave-android-build:
    name: Wave Android Build
    max_build_duration: 60

    environment:
      vars:
        PACKAGE_NAME: "com.wave.musicapp"
        # Defines where the SDK lives and appends sdkmanager to the executable PATH
        ANDROID_HOME: /Users/builder/Library/Android/sdk
        PATH: $PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin
      node: 20.11.1

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install Cordova CLI & Workspace Purge
        script: |
          npm install -g cordova
          # Deep clean prior execution states to avoid manifest grafting errors
          rm -rf platforms/android
          rm -rf plugins/

      - name: Install Android SDK 35
        script: |
          # Added the --sdk_root flag as a safety measure for newer cmdline-tools
          yes | sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-35"
          yes | sdkmanager --sdk_root=$ANDROID_HOME "build-tools;35.0.0"

      - name: Add Android platform and restore plugins
        script: |
          # Fresh injection of platform targeting Android 15 requirements
          cordova platform add android@13.0.0
          
          # This reads your updated config.xml, installs the specified versions, 
          # and correctly applies the required AndroidManifest.xml merges without crashing.
          cordova prepare android

      - name: Build debug APK
        script: |
          cordova build android --debug

    artifacts:
      - platforms/android/app/build/outputs/apk/debug/*.apk
      - platforms/android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - you@example.com
        notify:
          success: true
          failure: true
