workflows:
  wave-android-build:
    name: Wave Android Build
    max_build_duration: 60

    environment:
      vars:
        PACKAGE_NAME: "com.wave.musicapp"
        ANDROID_HOME: /Users/builder/Library/Android/sdk
        ANDROID_SDK_ROOT: /Users/builder/Library/Android/sdk
        PATH: $ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools:$PATH
      node: 20.11.1

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install Cordova CLI & clean workspace
        script: |
          npm install -g cordova
          rm -rf platforms/android
          rm -rf plugins/

      - name: Install Android SDK 34 platform and build-tools
        script: |
          yes | sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-34"
          yes | sdkmanager --sdk_root=$ANDROID_HOME "build-tools;34.0.0"

      - name: Add Android platform and restore plugins
        script: |
          cordova platform add android@13.0.0
          cordova prepare android
          echo "--- current working directory ---"
          pwd
          echo "--- full platforms/android contents ---"
          ls -la platforms/android/ || echo "platforms/android does not exist"

      - name: Force correct SDK path for Gradle
        script: |
          echo "sdk.dir=$ANDROID_HOME" > platforms/android/local.properties
          cat platforms/android/local.properties

      - name: Patch appcompat dependency version
        script: |
          sed -i.bak "s/androidx.appcompat:appcompat:[0-9.]*/androidx.appcompat:appcompat:1.7.0/g" platforms/android/app/build.gradle
          echo "--- build.gradle appcompat line ---"
          grep "appcompat" platforms/android/app/build.gradle

      - name: Build debug APK
        script: |
          cordova build android --debug

    artifacts:
      - platforms/android/app/build/outputs/apk/debug/*.apk
      - platforms/android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - you@example.com
        notify:
          success: true
          failure: true
